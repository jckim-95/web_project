<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - CleanPro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="contact-page">

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">CleanPro</a>
            <nav class="nav-links">
                <a href="index.html">홈</a>
                <a href="about.html">회사소개</a>
                <a href="services.html">서비스</a>
                <a href="portfolio.html">시공사례</a>
                <a href="contact.html" class="active">문의하기</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section page-header">
            <div class="container">
                <h1>문의하기</h1>
                <p>궁금한 점이 있으시거나 견적이 필요하시면 언제든 편하게 연락주세요.</p>
            </div>
        </section>

        <section class="section">
            <div class="container contact-grid">
                <div class="contact-info">
                    <h2>연락 정보</h2>
                    <p>빠른 상담을 원하시면 아래 연락처로 문의해주세요.</p>
                    <ul>
                        <li><strong>전화:</strong> 010-1234-5678</li>
                        <li><strong>이메일:</strong> contact@cleanpro.com</li>
                        <li><strong>운영 시간:</strong> 평일 09:00 - 18:00</li>
                    </ul>
                    <p>주말/공휴일은 사전 예약 시 시공 가능합니다.</p>
                </div>
                <div class="contact-form">
                    <h2>온라인 문의</h2>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="name">이름 / 회사명</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">연락처</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                         <div class="form-group">
                            <label for="service-type">문의 서비스</label>
                            <select id="service-type" name="service-type">
                                <option>서비스 선택</option>
                                <option>회사/오피스 클리닝</option>
                                <option>입주/이사 청소</option>
                                <option>상업 공간 청소</option>
                                <option>특수 클리닝</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">문의 내용</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">문의 보내기</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 CleanPro Service. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
